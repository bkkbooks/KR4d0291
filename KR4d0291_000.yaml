body:
  text: 華亭百詠别集類三宋提要臣等謹案華亭百詠一卷宋許尚撰尚自號和光老人華亭人其始末無考是編作于淳熙間取華亭古蹟每一事為一絶句題下各為之注然百篇之中無注者凡二十九而其中多有非注不明者以例推之當日不容不注殆傳寫佚脫歟弔古之詩大抵不出今昔之感自唐許渾諸人已不能拔出窠臼至于一地之景衍成百首則數首以後語意略同固亦其所厲鶚作宋詩紀事僅録其陸機茸三女岡征北將軍墓顧亭林白龍洞俞塘普照寺陸瑁養魚池唳鶴灘湖光亭十首亦以其罕逢新警故也然格意雖多復衍而措詞修潔尚不失為雅音所注雖簡略而其時在今五六百年之前舊跡猶未全湮方隅之所在名目之所由亦尚足備志乘之參考在詩家則無異於衆人在輿記之中則視後來支離附㑹者勝之多矣乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:85448707bbbd1bd272199d805f9626adf10deab35230139e02608546d4d004a6

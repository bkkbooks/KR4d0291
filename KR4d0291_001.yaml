body:
  text: 華亭百詠宋許尚撰顧亭林旦暮潮流急東西徑路斜無從質疑字共屬野王家顧府君宅即顧亭林雲寺祠堂蕭蕭蘭若地知是府君居祠事今誰奉吾來一歎吁東菴異迹在顧亭林菴中有忠烈公像近嵗忽地裂數尺中有風濤聲以物探之則應手火起地脈風雷吼人疑湧海潮將軍英爽在何物敢興妖金山激浪聞澎湃山神陰力多風濤歸指顧海若敢誰何安公像昔有僧沈海而死肉身尚存浮鉢來滄海幡然厭世塵補陀崖畔月長照定中身寒穴泉濆湧懸崖下泠泠注不窮將期挹甘冷弱水漸難通蘇州洋又名金闕南舶欲入華闕此亭者必闕放蘇州洋蓋闕屬處舊蘇州已出天池外狂瀾尚爾髙蠻商識吳路嵗入幾千艘華亭谷府南三里入松陵瀰漫連迥野潮汐往來頻慣識松陵路重來不問津八角井浚極疑無底丰稜定有因沈沈中夜月照影屬何人陸機茸在谷東吳陸遜生二孫常于此遊獵今名桑陸又名吳王獵場二陸為童日驅馳屢忘歸至今桑柘響禽鳥尚驚飛柘湖展武沈淪後波澄一鑑明桑田復更變觸目總柴荆秦女祠狼秦崇苛政有女亦蒙寃欲弔興亡事神應恥重論唳鶴湖洗蕩雲間路奫淪一水深月光零露重遙聽九臯音三女岡三殮知無有香魂計已銷頻來吟楚些嵗久若為招金山城府南八十五里舊經云昔周康王東遊鎮大海故築此城治盛周康世東遊豈信然城闉亦隳廢門諜漫相傳前京城府南八十五里輿地志云本海鹽縣以地近京故以為名廬落皆無有依稀古堞存登臨認遺迹林莽暮煙昏崑山嵗久阡原變平時草木深英才沒黃壤舊事不堪尋陸機宅在崑山華第今何在千年漫有名披榛問遺裔寂莫一傷情谷水短棹經由處風披藻荇香中宵孤鶴唳片月印滄浪秦皇馳道歎息秦皇帝何年此逸遊迢迢大堤路千古為嗟羞征北將軍墓即陸禕墓在崑山有碑村人疲于官吏征索遂碎其碑崎嶇尋古隧衰草隱寒原欲讀將軍事豐碑祇半存鳳皇山覽德來何代慵歸丹穴藏甘心化為石萬嵗瑞吾皇陸寶山府北二十五里祕寶封堅石山靈謹護藏欲為中帑助時復露光芒佘山祖傳舊有佘氏墓道于此因名焉人與室俱化陰森松竹寒時時見孤鶴疑此守神丹集賢里父老云昔陳陸諸公居此因以為名冠蓋遊從日欣然萃一鄉田原總如昨誰復嗣餘芳白龍洞在橫雲山頂下通澱山湖每風雨夜有龍出入洞中呼吸湖中水山椒寄此身洞門風雨夜電火逐霜鱗石魚雙鯉何年刻悠然鬐鬛全登臨忽懷逺尺素若為傳秀道者塔在佘山秀昔廬此山有二虎侍之後自建塔于山巔建畢還積薪自焚止存碑銘辛勤成雁塔俄赴積薪焚靜夜耽耽影疑來護刻文靈峯菴在佘山池皆金砂後為昭慶禪院路湧金砂地髙人此築菴為詢林下客妙語與誰參芥子菴林外三椽建常思憩息時莫教嫌迫窄中有五須彌澱山府北七十里在澱湖之中殿閣輝金碧遐觀足畫圖維舟一登覽誤陟小方壺三姑廟在府南柘湖之側湖中羣蛟競鬬水為騰沸獨不入廟中神居陰物護臬閾捍洪波莫慮蛟龍怒年來畏叱呵蓮巢在青龍陳氏疏地種蓮為休息之地今已堙廢記得荷香裏蛾眉唱採蓮千年龜欲總不見葉田田鬼書在聖果寺昔常顯異于寺僧自稱東漢烈士沈光有書石刻壯士為儒恥捐軀志所甘無名豫青史幽憤亦何堪孔宅在府北七十五里昔有孔姓者遊吳居此因名焉又云昔夫子所居忽有先聖闕一碑額曰孔村人怪而碑之廟貌逾千祀泥封古碣昏傳云素王宅真贋與誰論嵩宅府西三十五里昔晉將軍袁嵩居此因名焉疆場功成後歸來卜一丘當時應種德名字播千秋俞塘府東五里往來之舟皆可揚帆諺有云雖有珠千斛不賣俞塘北延袤三鄉外東流與海通河神屢加意帆借往來風鶴坡府東七十里此地出鶴俗呼鶴窠者是也索莫東郊逺仙禽盡此藏夢回明月夜林杪響圓吭砂岡府東三十五里南屬海北屬江入土一尺皆螺蚌殼如是者三所相傳海上湧三浪而成豈誠然歟千里平砂地聨通江海湄漫傳因激浪疑是蚌成基御史涇在府東疏鑿人何在流功幾世餘農氓誦名氏不數鄭公渠滬瀆府西八十三里即松陵江水源出太湖松江之民資灌溉之利泛泛松江水迢迢笠澤通萬年知禹力灌溉有餘功東堂以下三咏並在府治廳事之側廳在清間處金猊罩寶香令君今學道來此吸朝陽思齊堂伊昔絃歌治能聲著海隅升堂想遺迹勵志欲齊驅月榭簷角銜墻固明疏護翠羅公餘秉談麈竟夕對金波濯纓亭府前官亭輿梁斜倚處簷影墜清流往往抽簪者常為孺子羞石獸相傳昔常為怪夜則環市而走遂斷其一足以下二詠並府東刻鑿知何謂彌年亦有神宵行無足怪一吼亦驚人震橋昔姚庭輝宰此邑謂主位頗虛多宜客人作亭以鎮之又名虹橋虹音降瓦木明丹堊初期鎮此方石梁今欲圮尤益冨蠻商小隱園妝點林泉趣銷除市井心平生跧伏計到此意偏深姚將軍廟本在邑南宰謂廟門面北不利土人遂移至縣西以南鄉以下二十八詠並在府西陰功周邑境南面固宜然毋復論民事神今憚改遷趙店闕邑之闕市東名趙店今有神闕之趙店日日黃塵路喧豗漲市聲神靈自安此不欲變名稱望雲橋父老云立橋日適有瑞雲見因以為名憶昨登臨日卿雲正四翔重來窮目力天末起祥光石幢望雲橋南此地昔有湧泉云是海眼立幢于上以鎮之矻立應千載傳因海眼成蓬萊水清淺曽不見欹傾普照寺晉陸機宅捨為寺髙門收畫戟即此見精藍施豫恩雖在緇流絶不談彌陀閣拄策徐徐上回環佛頂遊九山俱在望日斷暮煙浮羅漢院邃宇中何有台山五百尊云何困人力金像總塵昏丁公橋相傳令威由此仙去又名丁行橋令威仙去後遺迹歎成非華表成烏有何由見鶴歸雲間館郵亭臨爽塏杗廇架修虹我亦輪蹄客心期訪士龍福順廟殿宇之上烏雀不棲門垣雖蠧壞古屋尚深沈鳥雀猶知避斯民盍致欽東嶽行祠明主東封後龜蒙望亦尊巍然此行宇時許薦蘋蘩西庵陳律師庵律師常習儒業蚤為儒冠誤齊心學竺乾而今林下塔夜夜戒光圓白龍潭神物幽潛地滄滄水接空不緣嘗應禱誰識有殊功毗盧菴勾氏香火中有御書閣捫蘿通一徑修竹蔽中籬祇有奎章在龍神暗護持西林林外初晴後斜陽滿芰荷頻來指靈鷲此去路無多陸瑁養魚池即西湖也今為放生池誰得陶朱術修治一水寬皇恩浹魚鱉不復敢垂竿小湖西湖之北一灣名小湖獵獵風蒲外淵淵明月秋詩翁浮短艇弭楫看遊倏湖橋瀲灔湖光好荷風六月涼倚欄吟不倦魚鳥亦相忘唳鶴灘湖之東南隅養鶴人何在湖邊水尚清喚回中夜夢灘上戛然聲泳波亭在湖中呂梁觀已逺沂水浴應難却倚亭前柳時時照影寒風月臺舊市舶司吳使所建夜靜蒲萄皺雲舒玉鑑涼築堂人不見尊酒暗相望湖光亭風月亭之西日暮蝦鬚卷亭中雅燕開微風起蘋末波影動樽罍道院西湖之西後為延氏蔬圃淨宇今何在唯餘柏色新棲棲抱甕者不是煉丹人異木舊傳商人嘗夜夢有人自云吾土地神也能祭我令汝宜商每嵗商人夜半祭之往往獲其陰助蟠根知永逺曲幹聳蛟虬閩賈蒙私庇年年此薦羞顯忠廟以下十詠並在府南俯拜祠堂下遙思弼漢功吁嗟孝宣帝忘德太匆匆東寺世傳水陸池有龜數枚聞講經聲則緣隄而上罷則復去愛此稜伽士勤修戒行成文龜亦知善來聽講經聲證覺院舊之無礙禪院有人明七淨蠠沒締良因歎惜流風替誰為無垢人棲真菴仙路多官府真人未上升松窗霜月白相對誦黃庭柳園芳草池塘暖東風桃杏繁春歸人亦散寂寞鎖園門陸四公廟又名陸司空晉傑云亡久嘉名未遽湮嚴祠坐遺像猶解福吳民南庵堂壁有六祖畫像施水功成後耽耽梵宇深升堂瞻貌像默會祖師心薑庵陰曀楸梧裏烏鳴落日中九原人不作明贊亦何功望仙橋鶴駕乘風去千年竟不歸石梁憑望處空復白雲飛三洞庵句曲山頭客遨遊到市塵星冠頂霜月夜半正朝真淨居院昔馬耆法寧住此院故俗又呼為馬耆庵後法寧弟子亦住此庵明眼知何在山門久寂然宗風未淪替還喜一燈傳氷檗菴王道所居鳧舄棲遲地池流一徑斜先生久清苦不肯競紛華圓珠菴定回人寂靜繞鼻碧蓮香却認循簷月摩尼發夜光華亭百詠
